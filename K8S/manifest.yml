---
apiVersion: v1
kind: Namespace
metadata:
  name: hotstar          # matches K8S_NAMESPACE variable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstar-deployment    # matches K8S_DEPLOYMENT variable
  namespace: hotstar
  labels:
    app: hotstar
    build: "$(tag)"           # pipeline injects this via containers: parameter
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hotstar
  template:
    metadata:
      labels:
        app: hotstar
    spec:
      containers:
      - name: hotstar-container
        image: rkdasari0318/disney-hotstar:latest   # overridden by containers: $(DOCKER_IMAGE):$(tag)
        ports:
        - containerPort: 3000        # matches APP_PORT variable
        resources:
          requests:
            memory: '128Mi'
            cpu: '100m'
          limits:
            memory: '256Mi'
            cpu: '300m'
---
apiVersion: v1
kind: Service
metadata:
  name: hotstar-service
  namespace: hotstar
spec:
  type: LoadBalancer
  selector:
    app: hotstar
  ports:
  - port: 80
    targetPort: 3000               # matches APP_PORT variable